<header
  class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-md shadow-sm flex items-center justify-between px-8 py-4"
>
  <div class="flex items-center gap-8">
    <h2 class="text-xl font-bold tracking-tight text-slate-900">Agendar Cita</h2>
    <div class="relative">
      <span
        class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-sm"
        >search</span
      >
      <input
        class="pl-10 pr-4 py-2 bg-slate-100 border-none rounded-full text-xs w-64 focus:ring-2 focus:ring-blue-500 transition-all"
        placeholder="Buscar pacientes o expedientes..."
        type="text"
      />
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button class="p-2 text-slate-500 hover:bg-slate-50 rounded-full transition-colors relative">
      <span class="material-symbols-outlined">notifications</span>
      <span
        class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"
      ></span>
    </button>
    <button class="p-2 text-slate-500 hover:bg-slate-50 rounded-full transition-colors">
      <span class="material-symbols-outlined">help</span>
    </button>

    <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>

    <div
      class="flex items-center gap-3 cursor-pointer hover:bg-slate-50 p-1 pr-3 rounded-full transition-colors"
    >
      <div class="w-8 h-8 rounded-full overflow-hidden border border-slate-200">
        <img
          class="w-full h-full object-cover"
          src="assets/avatar-doctor.png"
          alt="Dr. Ricardo Sosa"
        />
      </div>
      <div class="hidden lg:block">
        <p class="text-xs font-bold text-slate-900 leading-none">{{ username() }}</p>
        <p class="text-[10px] text-slate-500 font-medium">{{ mainRole() }}</p>
      </div>
    </div>
  </div>
</header>
