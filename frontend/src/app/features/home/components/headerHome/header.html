<header class="relative bg-[#1D4ED8]">
  
  <div class="border-b border-white/5 py-1.5">
    <div class="container mx-auto px-6 flex justify-end gap-6 text-[10px] font-medium text-white/40 uppercase tracking-[0.15em]">
      <div class="flex items-center gap-2">
        <i class="fas fa-phone-alt text-blue-300/40"></i> +57 300 123 4567
      </div>
      <div class="flex items-center gap-2 border-l border-white/10 pl-6">
        <i class="fas fa-envelope text-blue-300/40"></i> info@piedraazul.com
      </div>
    </div>
  </div>

  <nav class="bg-white sticky top-0 z-50 py-3 shadow-sm">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <a class="flex items-center gap-3 no-underline group" href="#">
        <div class="w-9 h-9 bg-[#1D4ED8] rounded-lg flex items-center justify-center text-white shadow-md shadow-blue-100 transition-transform group-hover:scale-105">
          <i class="fas fa-hospital text-lg"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-lg font-bold text-slate-800 leading-none tracking-tight">Piedra Azul</span>
          <span class="text-[8px] font-bold uppercase tracking-[0.2em] text-blue-500 mt-1">Red de Servicios</span>
        </div>
      </a>

      <div class="hidden lg:flex items-center gap-8">
        <a href="#" class="text-[13px] font-bold text-[#1D4ED8] no-underline">Inicio</a>
        <a href="#servicios" class="text-[13px] font-semibold text-slate-500 hover:text-[#1D4ED8] transition-colors no-underline">Servicios</a>
        <a href="#equipo" class="text-[13px] font-semibold text-slate-600 hover:text-[#1D4ED8] transition-colors no-underline">Equipo</a>
        <button class="bg-[#1D4ED8] text-white px-5 py-2 rounded-lg text-[11px] font-bold hover:bg-blue-700 transition-all shadow-sm uppercase tracking-wider">
          Registrarse
        </button>
      </div>
    </div>
  </nav>

  <div class="relative py-12 md:py-20 overflow-hidden">
    <div class="container mx-auto px-6 relative z-10">
      <div class="row align-items-center gy-10">
        <div class="col-12 col-md-5 text-white">
          <h1 class="text-3xl md:text-4xl font-bold leading-tight mb-5 tracking-tight">
            Cuidamos tu salud con <br>
            excelencia y dedicación
          </h1>
          <p class="text-blue-50/70 text-base leading-relaxed mb-8 font-normal max-w-sm">
            Red de servicios Piedra Azul ofrece atención integral con profesionales calificados y medicina alternativa.
          </p>
          
          <div class="flex flex-wrap gap-3">
            <button class="bg-white text-[#1D4ED8] px-7 py-3 rounded-xl font-bold text-[12px] shadow-lg shadow-blue-900/20 hover:bg-slate-50 transition-all flex items-center gap-2 group tracking-wide uppercase" routerLink="/agendar">
              Agendar cita 
              <i class="fas fa-arrow-right text-[10px] group-hover:translate-x-1 transition-transform"></i>
            </button>
            
            <button class="bg-transparent border border-white/20 hover:bg-white/5 text-white px-7 py-3 rounded-xl font-bold text-[12px] transition-all tracking-wide uppercase">
              Conoce médicos
            </button>
          </div>
        </div>

        <div class="col-12 col-md-7">
          <div id="carouselLugar" class="carousel slide rounded-3xl overflow-hidden shadow-2xl" data-bs-ride="carousel">
            <div class="carousel-inner">
              <div class="carousel-item active" data-bs-interval="4000">
                <img src="images/casa_piedra_azul - copia.png" class="d-block w-100 object-cover h-[380px]" alt="Promo 1">
              </div>
              <div class="carousel-item" data-bs-interval="4000">
                <img src="images/TERAPIA NEURAL.png" class="d-block w-100 object-cover h-[380px]" alt="Promo 2">
              </div>
              <div class="carousel-item" data-bs-interval="4000">
                <img src="images/ACUPUNTURA 2.png" class="d-block w-100 object-cover h-[380px]" alt="Promo 3">
              </div>
            </div>
            
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselLugar" data-bs-slide="prev">
              <span class="carousel-control-prev-icon scale-75" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselLugar" data-bs-slide="next">
              <span class="carousel-control-next-icon scale-75" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
