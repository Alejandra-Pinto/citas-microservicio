@if (pacienteInfo) {
  <div class="bg-white p-8 rounded-xl shadow-sm relative overflow-hidden border border-slate-100">
    <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-full -mr-16 -mt-16"></div>

    <div class="relative z-10 flex flex-col items-center text-center">
      <div class="relative mb-6">
        <img
          [src]="pacienteInfo.fotoUrl || 'assets/images/default-avatar.png'"
          class="w-32 h-32 rounded-3xl object-cover shadow-2xl border-4 border-white"
        />
        <span
          class="absolute -bottom-2 -right-2 bg-emerald-500 text-white p-2 rounded-xl shadow-lg"
        >
          <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1"
            >check_circle</span
          >
        </span>
      </div>

      <h3 class="text-2xl font-bold text-on-surface">
        {{ pacienteInfo.nombres }} {{ pacienteInfo.apellidos }}
      </h3>
      <p class="text-slate-500 font-medium mb-4">C.I. {{ pacienteInfo.documento }}</p>

      <div class="flex gap-2 w-full">
        <button
          class="flex-1 bg-surface-container-high py-3 rounded-lg text-primary font-bold text-xs hover:bg-primary hover:text-white transition-all"
        >
          CONTACTAR
        </button>
        <button
          class="p-3 bg-surface-container-high rounded-lg text-slate-500 hover:text-primary transition-colors"
        >
          <span class="material-symbols-outlined text-lg">mail</span>
        </button>
      </div>
    </div>
  </div>
}
