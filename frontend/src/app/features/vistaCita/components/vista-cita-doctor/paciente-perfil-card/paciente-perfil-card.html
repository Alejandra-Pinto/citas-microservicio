@if (pacienteInfo) {
  <div class="bg-white p-8 rounded-xl shadow-sm relative overflow-hidden">
    <div class="relative z-10 flex flex-col items-center text-center">
      <div class="relative mb-6">
        <img
          [src]="pacienteInfo.fotoUrl || 'assets/images/default-avatar.png'"
          class="w-32 h-32 rounded-3xl object-cover shadow-2xl border-4 border-white"
          alt="Avatar"
        />
      </div>

      <h3 class="text-2xl font-bold text-slate-800">
        {{ pacienteInfo.nombres }} {{ pacienteInfo.apellidos }}
      </h3>

      <p class="text-slate-500 font-medium mb-1">Documento: {{ pacienteInfo.documento }}</p>

      <p class="text-xs text-slate-400 mb-4 uppercase tracking-wider">
        Género: {{ pacienteInfo.genero }}
      </p>

      <div class="flex gap-2 w-full">
        <button
          class="flex-1 bg-slate-100 py-3 rounded-lg text-blue-600 font-bold text-xs hover:bg-blue-600 hover:text-white transition-all"
        >
          CONTACTAR
        </button>
      </div>
    </div>
  </div>
} @else {
  <div class="p-8 text-center text-slate-400 italic">Cargando datos del paciente...</div>
}
