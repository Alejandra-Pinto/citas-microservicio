<div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
  <div>
    <h2 class="text-3xl font-black tracking-tight text-slate-800 mb-2">Detalle de la Cita</h2>
    <p class="text-slate-500 font-medium text-sm">Panel de gestión médica - Piedra Azul</p>
  </div>

  <div class="flex items-center gap-3">
    <div
      [ngClass]="colorEstado"
      class="px-4 py-2 rounded-full text-[11px] font-black border flex items-center gap-2 transition-all duration-300"
    >
      <span class="w-2 h-2 rounded-full bg-current animate-pulse"></span>
      {{ estadoActual }}
    </div>

    <div class="relative group">
      <button
        class="px-5 py-2.5 bg-white shadow-sm border border-slate-200 rounded-xl flex items-center gap-2 text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all"
      >
        <span class="material-symbols-outlined text-sm">settings</span>
        ACCIONES
      </button>

      <div
        class="absolute right-0 mt-2 w-44 bg-white shadow-2xl rounded-2xl p-2 border border-slate-100 hidden group-hover:block z-50"
      >
        <button
          (click)="cambiarEstado('FINALIZADA')"
          class="w-full text-left p-3 hover:bg-emerald-50 rounded-xl text-[10px] font-bold text-emerald-600 flex items-center gap-2"
        >
          <span class="material-symbols-outlined text-sm">task_alt</span> FINALIZAR CITA
        </button>
        <button
          (click)="cambiarEstado('REAGENDADA')"
          class="w-full text-left p-3 hover:bg-amber-50 rounded-xl text-[10px] font-bold text-amber-600 flex items-center gap-2"
        >
          <span class="material-symbols-outlined text-sm">event_repeat</span> REAGENDAR
        </button>
        <div class="my-1 border-t border-slate-50"></div>
        <button
          (click)="cambiarEstado('CANCELADA')"
          class="w-full text-left p-3 hover:bg-red-50 rounded-xl text-[10px] font-bold text-red-500 flex items-center gap-2"
        >
          <span class="material-symbols-outlined text-sm">cancel</span> CANCELAR
        </button>
      </div>
    </div>
  </div>
</div>
