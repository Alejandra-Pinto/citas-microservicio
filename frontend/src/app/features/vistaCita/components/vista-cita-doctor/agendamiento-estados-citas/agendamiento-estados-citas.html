<div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
  <div>
    <h2 class="text-3xl font-black tracking-tight text-on-surface mb-2">Detalle de la Cita</h2>
    <p class="text-slate-500 font-medium">
      Gestiona y consulta la información detallada del paciente.
    </p>
  </div>

  <div class="flex flex-wrap gap-2">
    <button
      class="px-4 py-2 rounded-full text-xs font-bold bg-primary/10 text-primary border border-primary/20 flex items-center gap-2"
    >
      <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
      {{ estadoActual }}
    </button>

    <div class="relative group">
      <button
        class="p-2 bg-white shadow-sm border border-slate-100 rounded-lg flex items-center gap-2 text-sm font-bold text-slate-700 hover:bg-slate-50"
      >
        <span class="material-symbols-outlined text-sm">edit</span>
        Cambiar Estado
      </button>

      <div
        class="absolute right-0 mt-2 w-48 bg-white shadow-xl rounded-xl p-2 border border-slate-100 hidden group-hover:block z-50"
      >
        <div
          (click)="cambiarEstado('FINALIZADA')"
          class="p-2 hover:bg-slate-50 rounded-lg cursor-pointer flex items-center gap-3 text-xs font-bold text-emerald-500"
        >
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span> FINALIZADA
        </div>
        <div
          (click)="cambiarEstado('CANCELADA')"
          class="p-2 hover:bg-slate-50 rounded-lg cursor-pointer flex items-center gap-3 text-xs font-bold text-error"
        >
          <span class="w-2 h-2 rounded-full bg-error"></span> CANCELADA
        </div>
      </div>
    </div>
  </div>
</div>
