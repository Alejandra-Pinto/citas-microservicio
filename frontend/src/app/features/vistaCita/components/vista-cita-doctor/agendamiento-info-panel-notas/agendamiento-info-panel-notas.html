@if (citaInfo) {
  <div
    class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col h-full border border-slate-100"
  >
    <div class="px-8 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
      <h3 class="font-bold text-slate-700 flex items-center gap-2 text-sm uppercase tracking-wider">
        <span class="material-symbols-outlined text-blue-600">edit_note</span>
        Registro Clínico
      </h3>
      <div class="text-[10px] font-black text-slate-300 uppercase">Piedra Azul - Historia</div>
    </div>

    <div class="p-8">
      <textarea
        [(ngModel)]="citaInfo.notas"
        class="w-full min-h-[250px] border-none focus:ring-0 p-0 text-sm leading-relaxed text-slate-600 placeholder:text-slate-300 resize-none bg-transparent"
        placeholder="Escriba aquí la evolución del paciente, síntomas y diagnóstico..."
      >
      </textarea>

      <div class="mt-8 pt-6 border-t border-slate-50 flex flex-wrap gap-3 items-center">
        @for (tag of tags; track $index) {
          <div
            class="group px-3 py-1.5 bg-blue-50 rounded-lg text-[11px] font-bold text-blue-600 border border-blue-100 flex items-center gap-2 transition-all"
          >
            {{ tag }}
            <button
              (click)="eliminarTag($index)"
              class="hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <span class="material-symbols-outlined text-[14px]">close</span>
            </button>
          </div>
        }

        <div class="flex items-center gap-2">
          <input
            [(ngModel)]="nuevoTag"
            (keyup.enter)="agregarTag()"
            type="text"
            placeholder="Añadir #"
            class="px-2 py-1 text-[11px] border border-dashed border-slate-200 rounded-lg focus:border-blue-400 focus:ring-0 w-20 bg-slate-50/50"
          />
          <button (click)="agregarTag()" class="text-blue-400 hover:text-blue-600">
            <span class="material-symbols-outlined text-sm">add_circle</span>
          </button>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="animate-pulse bg-white h-80 rounded-xl shadow-sm border border-slate-100"></div>
}
