<div class="max-w-[1400px] mx-auto p-6 space-y-8">
  <app-agendamiento-estados-citas [estadoActual]="cita?.estado"></app-agendamiento-estados-citas>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
    <div class="lg:col-span-3 space-y-6">
      <app-paciente-perfil-card [pacienteInfo]="cita?.paciente"></app-paciente-perfil-card>

      <div class="bg-[#1e4cd6] p-6 rounded-2xl shadow-lg text-white relative overflow-hidden">
        <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">
          Nota del Sistema
        </p>
        <p class="font-medium text-sm leading-relaxed relative z-10">
          Verificar historial de alergias antes de prescribir medicamentos.
        </p>
        <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-white/10 rounded-full"></div>
      </div>
    </div>

    <div class="lg:col-span-9 space-y-6">
      <div>
        <app-agendamiento-info-medico [citaInfo]="cita"></app-agendamiento-info-medico>
      </div>

      <div>
        <app-agendamiento-info-panel-notas [citaInfo]="cita"></app-agendamiento-info-panel-notas>
      </div>
    </div>
  </div>
</div>
