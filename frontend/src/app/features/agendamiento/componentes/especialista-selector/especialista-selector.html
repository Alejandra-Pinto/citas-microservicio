<div class="space-y-3">
  <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500">
    Especialista Asignado
  </label>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <label
      *ngFor="let esp of especialistas"
      class="relative flex items-center gap-4 p-4 rounded-xl border-2 transition-all cursor-pointer group"
      [ngClass]="
        seleccionadoId === esp.id
          ? 'border-primary bg-blue-50'
          : 'border-slate-100 bg-white hover:border-blue-200'
      "
    >
      <input
        type="radio"
        class="absolute right-4 top-4 text-blue-600 focus:ring-blue-600"
        [value]="esp.id"
        [ngModel]="seleccionadoId"
        (ngModelChange)="onSeleccion(esp.id)"
        name="specialist"
      />
      <div class="w-12 h-12 rounded-full overflow-hidden bg-slate-100">
        <img
          class="w-full h-full object-cover"
          [src]="esp.foto || 'assets/default-doctor.png'"
          [alt]="esp.nombres"
        />
      </div>
      <div>
        <p class="text-sm font-bold text-slate-900">{{ esp.nombres }}</p>
        <p class="text-[10px] text-slate-500">{{ esp.especialidad }}</p>
      </div>
    </label>
  </div>
</div>
