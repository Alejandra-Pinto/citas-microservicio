<div class="p-8 bg-slate-50 border-t border-slate-100 flex justify-end gap-4">
  <button
    type="button"
    (click)="onCancel.emit()"
    class="px-6 py-3 text-slate-600 font-bold text-sm hover:bg-slate-200 rounded-xl transition-all"
  >
    Cancelar
  </button>

  <button
    (click)="confirmar()"
    [disabled]="disabled"
    [ngClass]="{
      'bg-primary shadow-blue-200 hover:bg-blue-700': !disabled,
      'bg-slate-300 cursor-not-allowed opacity-50': disabled,
    }"
    class="px-10 py-3 text-white font-bold text-sm rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2"
  >
    <span *ngIf="loading" class="animate-spin material-symbols-outlined text-sm"
      >progress_activity</span
    >
    {{ loading ? 'Agendando...' : 'Confirmar Cita' }}
  </button>
</div>
