<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <div class="space-y-2">
    <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500"
      >Fecha de Cita</label
    >
    <div class="relative">
      <input
        class="w-full px-4 py-3 bg-slate-50 border-slate-200 rounded-xl focus:ring-blue-600 focus:border-blue-600 text-sm font-medium"
        type="date"
        [ngModel]="fecha"
        (ngModelChange)="onFechaChange($event)"
      />
    </div>
  </div>

  <div class="space-y-2">
    <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500"
      >Horario Disponible</label
    >
    <select
      class="w-full px-4 py-3 bg-slate-50 border-slate-200 rounded-xl text-sm"
      [ngModel]="horaSeleccionada"
      (ngModelChange)="onHoraChange($event)"
    >
      <option value="" disabled selected>Seleccione una hora</option>
      <option *ngFor="let h of horarios" [value]="h.iso.split('T')[1].slice(0, 5)">
        {{ h.hora }}
      </option>
    </select>
  </div>
</div>
