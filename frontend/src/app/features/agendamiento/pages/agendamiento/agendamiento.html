

<div class="flex-1 w-full  bg-[#E6EBED]">
  <div class="p-8">
    <div class="max-w-7xl mx-auto">
      <div class="grid grid-cols-12 gap-8">
        <div class="col-span-12 lg:col-span-8 space-y-8">
          <div class="bg-[#F8FAFB] rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50">
              <h2 class="text-3xl font-extrabold font-headline tracking-tight text-slate-800 mb-2">Detalles de la Cita</h2>
              <p class="text-sm text-slate-500 mt-1">
                Complete la información para registrar una nueva consulta médica.
              </p>
            </div>

            <div class="p-8 space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                  <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500">
                    Cédula del Paciente
                  </label>
                  <input
  type="text"
  class="w-full px-4 py-3 bg-white border border-slate-500 rounded-xl 
         focus:ring-2 focus:ring-blue-500/20 focus:border-blue-600 
         text-sm font-semibold text-slate-700 placeholder:text-slate-500
         transition-all shadow-sm outline-none"
  placeholder="CC del paciente"
/>
                  <p
                    *ngIf="intentoEnvio && !formData.cedula"
                    class="text-[10px] text-red-500 font-bold italic ml-1"
                  >
                    * Campo obligatorio
                  </p>
                </div>

                <div class="space-y-2">
                  <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500"
                    >Nombre del Paciente</label
                  >
                  <input
                    type="text"
                    [(ngModel)]="formData.nombre"
                    name="nombre"
                    readonly
                    class="w-full px-4 py-3 bg-slate-100 border border-slate-300 rounded-xl text-sm font-medium text-slate-500 outline-none cursor-not-allowed"
                  />
                </div>
              </div>

              <div class="space-y-3">
                <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500"
                  >Tipo de Consulta</label
                >
                <div class="flex gap-4">
                  <button
                    type="button"
                    class="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl border-2 transition-all font-bold"
                    [ngClass]="
                      formData.tipo === 'PRIMERA_VEZ'
                        ? 'border-blue-600 bg-blue-50 text-blue-600'
                        : 'border-slate-200 bg-white text-slate-500'
                    "
                    (click)="formData.tipo = 'PRIMERA_VEZ'"
                  >
                    <span class="material-symbols-outlined">medical_information</span>
                    Primera Cita
                  </button>
                  <button
                    type="button"
                    class="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl border-2 transition-all font-bold"
                    [ngClass]="
                      formData.tipo === 'CONTROL'
                        ? 'border-blue-600 bg-blue-50 text-blue-600'
                        : 'border-slate-200 bg-white text-slate-500'
                    "
                    (click)="formData.tipo = 'CONTROL'"
                  >
                    <span class="material-symbols-outlined">history</span>
                    Control
                  </button>
                </div>
              </div>

              <app-horario-selector
                [fecha]="formData.fecha"
                [horaSeleccionada]="formData.hora"
                [horarios]="horarios"
                (fechaChange)="actualizarFecha($event)"
                (horaChange)="formData.hora = $event"
              ></app-horario-selector>

              <app-especialista-selector
                [especialistas]="especialistas"
                [seleccionadoId]="formData.especialistaid"
                (cambioEspecialista)="manejarCambioEspecialista($event)"
              ></app-especialista-selector>
            </div>

            <app-form-actions
              [disabled]="esFormularioInvalido"
              (onConfirm)="agendar()"
              (onCancel)="cancelar()"
            ></app-form-actions>
          </div>
        </div>

        <div class="col-span-12 lg:col-span-4 space-y-6">
          <app-paciente-resumen [paciente]="pacienteEncontrado"></app-paciente-resumen>

          <div>
            <app-disponibilidad-doctores></app-disponibilidad-doctores>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
