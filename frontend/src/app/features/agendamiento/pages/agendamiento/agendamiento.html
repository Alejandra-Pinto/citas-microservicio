<section class="p-8 max-w-6xl mx-auto w-full">
  <div class="grid grid-cols-12 gap-8">
    
    <div class="col-span-12 lg:col-span-8 space-y-8">
      
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-8 border-b border-slate-50">
          <h3 class="text-xl font-bold text-slate-800">Detalles de la Cita</h3>
          <p class="text-sm text-slate-500 mt-1">
            Complete la información para registrar una nueva consulta médica.
          </p>
        </div>

        <div class="p-8 space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500">
                Cédula del Paciente
              </label>
              <input
                type="text"
                [(ngModel)]="formData.cedula"
                (blur)="buscarPaciente()"
                (keyup.enter)="buscarPaciente()"
                [ngClass]="{ 'border-red-500 bg-red-50': intentoEnvio && !formData.cedula }"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-blue-600 focus:border-blue-600 text-sm font-medium transition-all outline-none"
                placeholder="CC del paciente"
              />
            </div>

            <div class="space-y-2">
              <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500">Nombre del Paciente</label>
              <input 
                type="text" 
                [(ngModel)]="formData.nombre" 
                class="w-full px-4 py-3 bg-slate-100 border-transparent rounded-xl text-sm font-medium text-slate-500" 
                readonly 
              />
            </div>
          </div>

          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500">Tipo de Consulta</label>
            <div class="flex gap-4">
              <button
                class="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-600 font-bold transition-all"
                (click)="formData.tipo = 'PRIMERA_VEZ'"
              >
                <span class="material-symbols-outlined">medical_information</span>
                Primera Cita
              </button>
              <button
                class="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl border-2 border-slate-100 bg-white text-slate-400 hover:border-slate-200 hover:text-slate-600 font-bold transition-all"
                (click)="formData.tipo = 'CONTROL'"
              >
                <span class="material-symbols-outlined">history</span>
                Control
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <app-horario-selector
              class="w-full col-span-2"
              [fecha]="formData.fecha"
              [horaSeleccionada]="formData.hora"
              [horarios]="horarios"
              (fechaChange)="actualizarFecha($event)"
              (horaChange)="formData.hora = $event"
            ></app-horario-selector>
          </div>

          <div class="space-y-3">
            <app-especialista-selector
              [especialistas]="especialistas"
              [seleccionadoId]="formData.especialistaid"
              (cambioEspecialista)="manejarCambioEspecialista($event)"
            ></app-especialista-selector>
          </div>
        </div>

        <app-form-actions
          [disabled]="esFormularioInvalido"
          (onConfirm)="agendar()"
          (onCancel)="cancelar()"
        ></app-form-actions>
      </div>
    </div>

    <div class="col-span-12 lg:col-span-4 space-y-6">
      <app-paciente-resumen [paciente]="pacienteEncontrado"></app-paciente-resumen>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
        <h4 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">Disponibilidad Hoy</h4>
        </div>
    </div>

  </div>
</section>
