<div class="bg-primary text-white p-8 rounded-2xl shadow-xl relative overflow-hidden">
  <div class="relative z-10">
    <span class="text-[9px] font-black uppercase tracking-[0.2em] opacity-80"
      >Información del Paciente</span
    >

    <h4 class="text-2xl font-bold mt-2">
      {{ paciente ? paciente.nombres + ' ' + paciente.apellidos : 'Seleccione Paciente' }}
    </h4>

    <p class="text-xs opacity-80 mt-1">Estado: {{ paciente?.activo ? 'Activo' : 'Inactivo' }}</p>

    <div class="mt-8 grid grid-cols-2 gap-4">
      <div class="bg-white/10 backdrop-blur-md p-3 rounded-xl">
        <p class="text-[9px] uppercase font-bold opacity-60">Edad</p>
        <p class="text-lg font-bold">{{ getEdad() }}</p>
      </div>

      <div class="bg-white/10 backdrop-blur-md p-3 rounded-xl">
        <p class="text-[9px] uppercase font-bold opacity-60">Género</p>
        <p class="text-lg font-bold">{{ paciente?.genero || '--' }}</p>
      </div>
    </div>

    <button
      class="mt-8 w-full py-3 bg-white text-primary font-bold text-xs rounded-lg hover:bg-blue-50 transition-colors"
    >
      Ver Historial Completo
    </button>
  </div>

  <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-400/20 rounded-full blur-3xl"></div>
  <div class="absolute -left-10 -top-10 w-40 h-40 bg-blue-300/10 rounded-full blur-3xl"></div>
</div>
