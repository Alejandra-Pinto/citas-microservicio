<div class="relative flex h-auto min-h-screen w-full lg:max-w-6xl mx-auto flex-col bg-white dark:bg-background-dark shadow-xl overflow-x-hidden">

  <div class="flex items-center bg-white dark:bg-background-dark p-4 border-b border-gray-100 dark:border-gray-800 sticky top-0 z-10 justify-between">
    <div routerLink="/" class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer rounded-full hover:bg-primary/10">
      <span class="material-symbols-outlined"><i class="fas fa-arrow-left"></i></span>
    </div>
    <h2 class="text-[#0c121d] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Agendar Cita</h2>
  </div>

  <div class="px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar">
    <div class="flex items-center gap-2 whitespace-nowrap bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-semibold">
      <span class="size-2 bg-primary rounded-full"></span>
      Seleccionar Especialista
    </div>
    <div class="flex items-center gap-2 whitespace-nowrap bg-gray-100 dark:bg-gray-800 text-gray-500 px-3 py-1 rounded-full text-xs font-semibold">
      <span class="size-2 bg-gray-300 rounded-full"></span>
      Horario
    </div>
  </div>

  <div class="lg:grid lg:grid-cols-12 lg:gap-8 px-4 py-6">

    <div class="lg:col-span-4 space-y-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-[#0c121d] dark:text-white text-lg font-bold">Especialistas</h3>
        <span class="text-primary text-sm font-medium cursor-pointer">Ver todos</span>
      </div>

      <div class="grid grid-cols-1 gap-4">
        <div class="flex items-center gap-4 rounded-xl bg-white dark:bg-gray-900 p-4 border-2 border-primary shadow-sm">
          <div class="size-16 rounded-lg bg-cover bg-center" style='background-image:url("/image/doctoraClara.png")'></div>
          <div class="flex-1">
            <p class="text-[#0c121d] dark:text-white text-sm font-bold leading-tight">Dr. Ibis Gonzales</p>
            <p class="text-gray-500 dark:text-gray-400 text-xs font-normal mt-0.5">Cardiología • 12 años exp.</p>
          </div>
          <div class="text-primary">
            <span class="material-symbols-outlined">check_circle</span>
          </div>
        </div>

        <div class="flex items-center gap-4 rounded-xl bg-white dark:bg-gray-900 p-4 border border-gray-100 dark:border-gray-800 shadow-sm opacity-70 cursor-pointer hover:opacity-100 transition-opacity">
          <div class="size-16 rounded-lg bg-cover bg-center" style='background-image: url("https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=200&auto=format&fit=crop");'></div>
          <div class="flex-1">
            <p class="text-[#0c121d] dark:text-white text-sm font-bold leading-tight">Dr. Jose</p>
            <p class="text-gray-500 dark:text-gray-400 text-xs font-normal mt-0.5">Columna • 12 años exp.</p>
          </div>
          <button class="px-3 py-1 text-xs font-semibold text-primary border border-primary rounded-lg">Seleccionar</button>
        </div>
      </div>
    </div>

    <div class="lg:col-span-8 flex flex-col gap-12 border-l border-gray-100 dark:border-gray-800 lg:pl-12 mt-8 lg:mt-0 pb-32">

      <div>
        <h3 class="text-[#0c121d] dark:text-white text-lg font-bold mb-4">Seleccionar Fecha</h3>
        <div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
          <div class="flex flex-col items-center justify-center min-w-[80px] h-24 rounded-xl bg-primary text-white shadow-lg cursor-pointer">
            <span class="text-xs uppercase font-bold opacity-80">Mar</span>
            <span class="text-xl font-bold">17</span>
          </div>
          <div class="flex flex-col items-center justify-center min-w-[80px] h-24 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 cursor-pointer">
            <span class="text-xs uppercase font-bold text-gray-400">Mie</span>
            <span class="text-xl font-bold text-gray-700 dark:text-gray-200">18</span>
          </div>
        </div>
      </div>

      <div>
        <h3 class="text-[#0c121d] dark:text-white text-lg font-bold mb-4">Horarios Disponibles</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <div class="py-4 px-2 text-center text-sm font-semibold rounded-lg bg-primary text-white shadow-md cursor-pointer">
            09:00 AM
          </div>
          <div class="py-4 px-2 text-center text-sm font-semibold rounded-lg bg-white dark:bg-gray-900 text-gray-700 border border-gray-200 cursor-pointer hover:border-primary">
            09:30 AM
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 w-full bg-white dark:bg-background-dark border-t border-gray-100 dark:border-gray-800 p-6 z-20">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
      <div class="flex gap-8">
        <div>
          <p class="text-xs text-gray-400 uppercase font-bold mb-1">Costo: </p>
        </div>
        <div class="border-l border-gray-100 pl-8">
          <p class="text-xs text-gray-400 uppercase font-bold mb-1">Horario Seleccionado</p>
          <p class="text-base font-semibold">Mar, 17 Mar • 09:00 AM</p>
        </div>
      </div>
      <button (click)="confirmarCita()"
        class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2">
        Confirmar Cita
      </button>
    </div>
  </div>
</div>
