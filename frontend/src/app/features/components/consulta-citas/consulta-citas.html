<div class="min-h-screen bg-slate-50 pb-20">
  <header class="bg-white border-b p-4 flex items-center justify-between sticky top-0 z-10">
    <button routerLink="/" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
      <span class="material-symbols-outlined text-slate-600">arrow_back</span>
    </button>
    <h1 class="text-lg font-bold text-slate-800">Mis Citas Médicas</h1>
    <div class="w-10"></div>
  </header>

  <main class="max-w-3xl mx-auto p-4 space-y-4">
    <div class="relative mt-2">
      <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">search</span>
      <input type="text" placeholder="Buscar por doctor o especialidad..."
             class="w-full pl-10 pr-4 py-3 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-600">
    </div>

    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mt-6">Próximas Citas</h2>

    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col gap-4">
      <div class="flex justify-between items-start">
        <div class="flex gap-4">
          <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
            <span class="material-symbols-outlined">calendar_today</span>
          </div>
          <div>
            <h3 class="font-bold text-slate-800">Dr. Sofia Mendez</h3>
            <p class="text-xs text-slate-500 font-medium text-blue-600">Cardiología</p>
          </div>
        </div>
        <span class="px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase">Confirmada</span>
      </div>

      <div class="bg-slate-50 rounded-xl p-3 flex justify-around items-center">
        <div class="text-center border-r border-slate-200 pr-4">
          <p class="text-[10px] text-slate-400 font-bold uppercase">Fecha</p>
          <p class="text-sm font-bold text-slate-700">17 Mar, 2026</p>
        </div>
        <div class="text-center">
          <p class="text-[10px] text-slate-400 font-bold uppercase">Hora</p>
          <p class="text-sm font-bold text-slate-700">09:00 AM</p>
        </div>
      </div>

      <div class="flex gap-2">
        <button class="flex-1 py-2 text-xs font-bold text-red-500 border border-red-100 rounded-lg hover:bg-red-50">Cancelar</button>
        <button class="flex-1 py-2 text-xs font-bold text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100">Reagendar</button>
      </div>
    </div>
  </main>
</div>
