<main class=" pt-24 pb-12 px-10 min-h-screen"> 
  
  <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-6">
    <div> 
      <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em] mb-2 block">
        Gestión de Salud
      </span>
      <h2 class="text-[36px] font-extrabold text-slate-800 tracking-tight leading-none">
        Citas de Hoy
      </h2>
      <div class="flex items-center gap-2 mt-2 text-slate-500"> 
        <span class="material-symbols-outlined text-[18px]">calendar_month</span>
        <p class="text-sm font-medium">Lunes, 24 de Julio, 2024</p>
      </div>
    </div>
    <div class="flex items-center gap-3"> 
      <button class="flex items-center gap-2 px-5 py-2.5 bg-white text-slate-700 font-bold text-sm rounded-lg border border-slate-200 hover:bg-slate-50 transition-all shadow-sm active:scale-95">
        <span class="material-symbols-outlined text-[20px]">picture_as_pdf</span> Exportar PDF 
      </button> 
      <button routerLink="/agendar" class="flex items-center gap-2 px-6 py-2.5 bg-blue-600 text-white font-bold text-sm rounded-lg hover:bg-blue-700 transition-all shadow-xl shadow-blue-600/20 active:scale-95">
        <span class="material-symbols-outlined text-[20px]">add_circle</span> Nueva Cita
      </button> 
    </div>
  </div>

  <app-metricas-citas [citas]="citas" class="block mb-10"></app-metricas-citas>

  <app-filtro-citas (buscar)="onBuscar($event)" class="block mb-6"></app-filtro-citas>

  @if (loading) {
    <div class="flex justify-center items-center py-10">
      <p class="text-slate-500 font-bold animate-pulse">Cargando citas...</p>
    </div>
  }

  @if (error) {
    <div class="bg-red-50 text-red-600 p-4 rounded-xl font-bold mb-6 border border-red-100">
      {{ error }}
    </div>
  }

  @if (!loading && citas.length === 0) {
    <div class="bg-white py-12 px-6 rounded-xl shadow-sm border border-slate-100 text-center text-slate-500 font-bold">
      <span class="material-symbols-outlined text-4xl mb-2 text-slate-300">event_busy</span>
      <p>No hay pacientes agendados para este filtro</p>
    </div>
  }

  @if (citas.length > 0) {
    <app-tabla-citas [citas]="citas"></app-tabla-citas>
  }

  

</main>
